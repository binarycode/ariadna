name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: true

      - name: Cache Rust compilation
        uses: Swatinem/rust-cache@v2
        with:
          add-rust-environment-hash-key: false

      - name: Initialize ESP32 dependencies
        run: devbox run just init

      # - name: Run formatting check
      #   run: devbox run just fmt
      #
      # - name: Run checks
      #   run: devbox run just check
      #
      # - name: Run tests
      #   run: devbox run just test
